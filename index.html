<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitTrack Lite — Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header_inner">
      <a class="site-header_brand" href="index.html">
        <svg class="site-header_logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 87" aria-hidden="true" focusable="false" preserveAspectRatio="xMidYMid meet">

        <g transform="translate(0,87) scale(0.1,-0.1)"
            fill="currentColor"
            stroke="none">

            <!-- Main runner shape (cleaned) -->
            <path d="M410 660
                    c-24 -24 -25 -48 -3 -80
                    c16 -22 16 -24 -5 -38
                    c-12 -8 -22 -20 -22 -26
                    c0 -19 -51 -110 -79 -139
                    c-33 -37 -54 -48 -115 -61
                    c-54 -12 -81 -40 -56 -57
                    c18 -12 150 -5 179 10
                    c11 6 47 14 80 17
                    c50 6 65 3 93 -14
                    c19 -12 40 -33 46 -47
                    c15 -32 56 -34 72 -4
                    c25 45 -9 98 -93 149
                    c-34 20 -36 24 -24 39
                    c22 26 26 47 16 85
                    c-6 21 -18 37 -30 41
                    c-12 4 -6 12 15 28
                    c18 14 25 25 25 50
                    c0 20 -8 31 -30 43
                    c-38 20 -46 19 -70 -5z"/>

            <!-- Left arm/leg -->
            <path d="M253 559
                    c-30 -11 -38 -45 -19 -74
                    c29 -44 96 -24 96 29
                    c0 37 -39 59 -77 45z"/>

            <!-- Right arm/leg -->
            <path d="M553 543
                    c-32 -21 -30 -66 2 -87
                    c33 -22 48 -20 73 7
                    c28 30 28 48 -1 75
                    c-27 26 -44 27 -74 5z"/>

        </g>
        </svg>
        <span>FitTrack Lite</span>
      </a>
      <button type="button" class="site-header_menu-btn" aria-expanded="false" aria-controls="site-nav-menu">
        <span class="visually-hidden">Toggle menu</span>
        <span class="site-header_menu-icon" aria-hidden="true"><span></span></span>
      </button>
      <nav id="site-nav-menu" class="site-header_nav" aria-label="Main">
        <ul class="site-nav">
          <li><a href="index.html" aria-current="page">Dashboard</a></li>
          <li><a href="workouts.html">Workouts</a></li>
          <li><a href="add-workout.html">Add Workout</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container" id="main">
    <h1 class="page-title">Dashboard</h1>
    <section class="stat-grid" aria-label="Summary stats">
      <article class="stat-card">
        <p class="stat-card_label">Total workouts</p>
        <p class="stat-card_value" id="stat-total-workouts" aria-live="polite">0</p>
      </article>
      <article class="stat-card">
        <p class="stat-card_label">Calories burned</p>
        <p class="stat-card_value" id="stat-total-calories" aria-live="polite">0 kcal</p>
      </article>
      <article class="stat-card">
        <p class="stat-card_label">Weekly progress</p>
        <p class="stat-card_value" id="stat-weekly-pct">0%</p>
        <div class="stat-card_progress" aria-hidden="true">
          <div class="stat-card_progress-fill" id="stat-weekly-bar" style="width: 0%"></div>
        </div>
        <p class="stat-card_meta" id="stat-weekly-meta">0 / 7 days in planner</p>
      </article>
    </section>

    <section class="weekly-planner" id="weekly-planner" aria-labelledby="planner-heading">
      <div class="weekly-planner__header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"/>
        </svg>
        <h2 class="weekly-planner__title" id="planner-heading">Weekly Planner</h2>
      </div>

      <div id="planner-grid" class="planner-grid"></div>

      <div class="planner-progress">
        <div class="planner-progress__top">
          <input type="checkbox" id="planner-progress-checkbox" disabled aria-readonly="true" title="Reflects planner completion">
          <p class="planner-progress__title">Weekly progress</p>
          <p class="planner-progress__pct" id="planner-progress-pct">0%</p>
        </div>
        <div class="planner-progress__track" aria-hidden="true">
          <div class="planner-progress__fill" id="planner-progress-bar"></div>
        </div>
        <p class="planner-progress__meta" id="planner-progress-count">0 / 7 workouts completed</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer_inner">
      <p class="site-footer_text">&copy; FitTrack Lite</p>
      <a class="site-footer_link" href="#main">Back to top</a>
    </div>
  </footer>

  <script src="js/nav.js" defer></script>
  <script src="js/planner-state.js" defer></script>
  <script src="js/planner.js" defer></script>
</body>
</html>
